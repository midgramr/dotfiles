unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General config
set -g allow-rename off
set -gq allow-passthrough on
set -g visual-activity off
set -g default-terminal 'xterm-kitty'
set -g focus-events on

# Styling
set -g status-style 'bg=#32302f'
set -g status-left ''
set -g status-right ''
set -g status-left-length 99
set -g status-right-length 99
set -g status-justify absolute-centre
set -g pane-border-style 'fg=#59524d'
set -g pane-active-border-style 'fg=#59524d'

# Key bindings
unbind r
bind r source-file ~/.tmux.conf ; display 'Reloaded config'

unbind v
unbind s
bind v selectl even-horizontal
bind s selectl even-vertical

unbind '"'
unbind %
bind | splitw -h
bind - splitw -v

unbind Up ; unbind Down ; unbind Left ; unbind Right
bind h selectp -L
bind j selectp -D
bind k selectp -U
bind l selectp -R

unbind C-Up ; unbind C-Down ; unbind C-Left ; unbind C-Right
unbind M-Up ; unbind M-Down ; unbind M-Left ; unbind M-Right
bind -r H resizep -L
bind -r J resizep -D
bind -r K resizep -U
bind -r L resizep -R

set -g repeat-time 1000

# Copy mode
setw -g mode-keys vi
unbind -T copy-mode-vi v
bind -T copy-mode-vi 'v' send -X begin-selection

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

